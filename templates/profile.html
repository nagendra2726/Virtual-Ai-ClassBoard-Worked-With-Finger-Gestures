<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Whiteboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cookie&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* --- Page Layout --- */
        .page-container {
            max-width: 1240px;
            margin: 120px auto 100px;
            padding: 0 40px;
        }

        .page-header h1 { font-family: 'Source Serif 4', serif; font-weight: 800; font-size: 2.8rem; margin: 0; }
        .page-header h1 span { color: var(--accent); }
        .page-header p { color: var(--text-secondary); font-size: 1.1rem; margin-top: 10px; opacity: 0.8; }

        /* --- Identity Card --- */
        .identity-section {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 50px;
            display: flex;
            align-items: center;
            gap: 50px;
            margin-top: 60px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .avatar-trigger {
            width: 160px;
            height: 160px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }

        .user-img { width: 100%; height: 100%; object-fit: cover; border-radius: 40px; }

        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: white; opacity: 0; transition: 0.3s;
        }
        .avatar-trigger:hover .avatar-overlay { opacity: 1; }

        .identity-info h2 { font-family: 'Source Serif 4', serif; font-weight: 700; font-size: 2rem; margin: 0; color: white; }
        .identity-info p { font-size: 1.2rem; color: var(--text-secondary); margin: 8px 0 0; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 0.85rem;
            margin-top: 20px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- Subscription Card --- */
        .membership-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            margin-top: 40px;
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
        }

        .membership-info h3 { font-family: 'Source Serif 4', serif; font-weight: 700; font-size: 1.4rem; color: white; margin: 0 0 10px; }
        .membership-info p { color: var(--text-secondary); margin: 0; }

        .detail-badge { padding: 5px 15px; border-radius: 50px; background: rgba(255,255,255,0.05); font-size: 0.8rem; font-weight: 600; color: white; border: 1px solid rgba(255,255,255,0.1); }

        /* --- Stats/Items Grid --- */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .detail-item {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .detail-label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .detail-value { font-size: 1.3rem; font-weight: 700; color: white; word-break: break-all; }

        /* --- Toast Notification --- */
        #status-toast {
            position: fixed; bottom: 30px; right: 30px; padding: 18px 35px; border-radius: 16px;
            color: white; transform: translateY(200%); transition: 0.5s; z-index: 10000;
            display: flex; align-items: center; gap: 15px; font-weight: 700;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        @media (max-width: 900px) {
            .identity-section { flex-direction: column; text-align: center; padding: 40px; }
            .membership-card { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="header neon-border-bottom">
        <div class="logo">
            <span class="logo-text">AirWrite</span>
        </div>
        <div class="menu-toggle" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <nav class="nav-menu" id="nav-menu">
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/pricing">Plans</a></li>
                <li><a href="/whiteboard" class="nav-write-btn"><i class="fas fa-pencil-alt"></i> Write</a></li>
                <li><a href="/profile">Profile</a></li>
                <li><a href="/logout" class="nav-logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </header>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('nav-menu');
            menu.classList.toggle('active');
            const icon = document.querySelector('.menu-toggle i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        }
    </script>

    <div class="page-container">
        <div class="page-header">
            <h1>Welcome, <span id="welcome-name">Creator</span></h1>
            <p>Manage your professional identity and subscription status in one unified hub.</p>
        </div>

        <div class="identity-section">
            <div class="avatar-trigger" id="avatar-trigger">
                <img src="" id="user-avatar" class="user-img" style="display: none;">
                <span id="avatar-init">?</span>
                <div class="avatar-overlay"><i class="fas fa-camera"></i></div>
                <input type="file" id="avatar-input" style="display:none;" accept="image/*">
            </div>
            <div class="identity-info">
                <h2 id="full-name">Loading...</h2>
                <p id="full-email">---@---.com</p>
                <div id="sub-badge-container">
                    <!-- Badge Injected -->
                </div>
            </div>
        </div>

        <div id="subscription-status-area">
            <!-- Active Sub Card or Redirect Area Injected -->
            <div class="membership-card">
                <div id="sub-loader" style="width: 100%; text-align:center; padding: 20px; color: var(--accent);">
                    <i class="fas fa-spinner fa-spin"></i> Synchronizing subscription...
                </div>
            </div>
        </div>

        <div class="details-grid">
            <div class="detail-item">
                <span class="detail-label">Authentication ID</span>
                <span class="detail-value" id="val-uid" style="font-size: 0.9rem; opacity: 0.6;">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Verified Gmail</span>
                <span class="detail-value" id="val-email">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Access Method</span>
                <span class="detail-value" id="val-provider">Standard Auth</span>
            </div>
        </div>
    </div>

    <div id="status-toast">
         <i class="fas fa-check-circle"></i> <span id="toast-msg">Success</span>
    </div>

    <script type="module">
        import { auth, db, storage } from '/static/js/firebase_config.js';
        import { onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const name = user.displayName || user.email.split('@')[0];
                document.getElementById('welcome-name').innerText = name;
                document.getElementById('full-name').innerText = name;
                document.getElementById('full-email').innerText = user.email;
                document.getElementById('val-uid').innerText = user.uid;
                document.getElementById('val-email').innerText = user.email;
                
                if (user.photoURL) {
                    document.getElementById('user-avatar').src = user.photoURL;
                    document.getElementById('user-avatar').style.display = 'block';
                    document.getElementById('avatar-init').style.display = 'none';
                } else {
                    document.getElementById('avatar-init').innerText = name.charAt(0).toUpperCase();
                }

                loadSubscriptionInfo(user.uid);
            } else {
                location.href = '/login';
            }
        });

        async function loadSubscriptionInfo(uid) {
            try {
                const subRef = doc(db, "subscriptions", uid);
                const snap = await getDoc(subRef);
                const area = document.getElementById('subscription-status-area');
                const badgeBox = document.getElementById('sub-badge-container');

                if (snap.exists() && snap.data().status === 'active') {
                    const data = snap.data();
                    const expiry = data.expiry.toDate ? data.expiry.toDate() : new Date(data.expiry);
                    
                    badgeBox.innerHTML = `
                        <div class="status-badge" style="background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2);">
                            <i class="fas fa-check-circle"></i> Subscribed
                        </div>
                    `;

                    area.innerHTML = `
                        <div class="membership-card">
                            <div class="membership-info">
                                <h3>${data.plan.toUpperCase()} Pro Active</h3>
                                <p>Premium benefits are currently active for your account.</p>
                                <div style="display:flex; gap:10px; margin-top:15px;">
                                    <span class="detail-badge">Expires: ${expiry.toLocaleDateString()}</span>
                                    <span class="detail-badge">Sync: Realtime</span>
                                </div>
                            </div>
                            <div class="membership-action">
                                <a href="/whiteboard" class="glass-btn" style="background: var(--success); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);">
                                    <i class="fas fa-rocket"></i> Launch Studio
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    badgeBox.innerHTML = `
                        <div class="status-badge" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2);">
                            <i class="fas fa-times-circle"></i> Not Subscribed
                        </div>
                    `;

                    area.innerHTML = `
                        <div class="membership-card" style="background: rgba(244, 63, 94, 0.05); border-color: rgba(244, 63, 94, 0.1);">
                            <div class="membership-info">
                                <h3 style="color: var(--danger);">Action Required</h3>
                                <p>Unlock professional features like cloud-saving and multi-device sync.</p>
                            </div>
                            <div class="membership-action">
                                <a href="/pricing" class="glass-btn" style="background: var(--accent);">Upgrade to Pro</a>
                            </div>
                        </div>
                    `;
                }
            } catch (err) { console.error(err); }
        }

        // --- Avatar Upload Logic ---
        const trigger = document.getElementById('avatar-trigger');
        const input = document.getElementById('avatar-input');
        trigger.onclick = () => input.click();

        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const user = auth.currentUser;
            trigger.style.opacity = '0.5';
            try {
                showToast("Uploading Identity...", "info");
                const avatarRef = ref(storage, `profiles/${user.uid}/avatar.jpg`);
                await uploadBytes(avatarRef, file);
                const url = await getDownloadURL(avatarRef);

                await updateProfile(user, { photoURL: url });
                document.getElementById('user-avatar').src = url;
                document.getElementById('user-avatar').style.display = 'block';
                document.getElementById('avatar-init').style.display = 'none';
                showToast("Profile Updated!");
            } catch (err) {
                showToast("Upload Failed", "error");
            } finally { trigger.style.opacity = '1'; }
        };

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('status-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.background = type === 'error' ? 'var(--danger)' : (type === 'info' ? 'var(--accent)' : 'var(--success)');
            toast.style.transform = 'translateY(0)';
            setTimeout(() => { toast.style.transform = 'translateY(200%)'; }, 4000);
        }

        document.getElementById('logout-btn').onclick = async () => {
            await signOut(auth);
            location.href = '/login';
        };
    </script>
</body>
</html>
